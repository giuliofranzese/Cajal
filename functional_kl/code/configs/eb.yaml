data_params:
  general:
    M: 101
    D: 5
    amp_way: '*knrm'
    x0source: gt
  X0_GP_matern:
    noise_type: data
    n_empirical: 32
    eps_decay: 1.0
    nu_K: 0.5
    ell_K: 0.1
    sigma2_K: 1.0
    white_noise: false
  X1:
    A_path:
      101: "path to data A"
    B_path:
      101: "path to data B"
trainer_params:
  n_samples_train: 300
  n_samples_gen: 150
  t_train_sampling_scheme: importance_sampling_t/(1-t)
  prediction: vt_from_substraction
  loss_lam_time: 1
  loss_decay: true
  batch_size: 32
  num_iterations: 20000
  ema_opti: true
  sfolder: log/EB
  upsample_gen:
  - 1
  epochs_selected: -1
  lr: 0.00128
  lr_sch_step: 50
  lr_gamma: 1
  opt_name: muon
  curriculum_sampling: true
  curriculum_switch_frac: 0.4
  curriculum_logit_mean: 0.5
  curriculum_logit_std: 1.5
nn_params:
  model_type: mino_t
  modes: 32
  width: 256
  mlp_width: 128
  x_dim: 1
  mino_params:
    num_classes: 2
    radius: 0.005
    enc_dim: 32
    enc_depth: 2
    enc_num_heads: 8
    dec_dim: 32
    dec_depth: 2
    dec_num_heads: 8
kl_params:
  n_t: 100
  t_kl_sampling_scheme: importance_sampling_t/(1-t)
  n_samples_kl: 500
  upsample_kl:
  - 1
  vdiff_source: sample
  v_source: neural_network
